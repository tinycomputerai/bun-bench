name: Setup releaser GitHub App
description: Create a releaser app token and configure git/gh for the bot.

inputs:
  client-id:
    description: GitHub App client ID for the releaser app
    required: true
  private-key:
    description: GitHub App private key for the releaser app
    required: true
  permission-contents:
    description: Repository contents permission for the installation token
    required: false
    default: write

outputs:
  token:
    description: GitHub App installation access token
    value: ${{ steps.app-token.outputs.token }}
  app-slug:
    description: GitHub App slug
    value: ${{ steps.app-token.outputs.app-slug }}
  user-id:
    description: GitHub user ID for the app bot
    value: ${{ steps.app-user.outputs.user-id }}

runs:
  using: composite
  steps:
    - name: Create GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        permission-contents: ${{ inputs.permission-contents }}

    - name: Get GitHub App user ID
      id: app-user
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        set -euo pipefail
        user_id="$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)"
        echo "user-id=${user_id}" >> "$GITHUB_OUTPUT"

    - name: Configure GitHub App git credentials
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        set -euo pipefail
        git config user.name "${{ steps.app-token.outputs.app-slug }}"
        git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}@users.noreply.github.com"
        gh auth setup-git

        if git rev-parse --is-inside-work-tree >/dev/null 2>&1 && git remote get-url origin >/dev/null 2>&1; then
          git config --local --unset-all "http.${GITHUB_SERVER_URL}/.extraheader" || true
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        fi
